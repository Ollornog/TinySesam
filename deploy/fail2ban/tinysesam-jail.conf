# /etc/fail2ban/jail.d/tinysesam.conf
# IPs, die zu oft fehlschlagen, auf Firewall-Ebene bannen (zusätzlich zum App-Lockout).
[tinysesam]
enabled  = true
filter   = tinysesam
backend  = auto
logpath  = /var/log/tinysesam/security.log   # dorthin muss der Logger "tinysesam.security" schreiben
maxretry = 6
findtime = 10m
bantime  = 1h
# port/action nach eurem Setup, z.B.:
# action = %(action_)s

