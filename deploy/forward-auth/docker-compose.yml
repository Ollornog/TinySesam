# TinySesam als OIDC-Forward-Auth-Gateway (deploy-and-go), zusammen mit Caddy.
#
#   docker compose up -d
#
# Caddy ruft je Request GET /auth/forward beim Gateway (siehe ./Caddyfile). Der Gateway macht
# ausschließlich OIDC-Login + Forward-Auth (keine Passwörter/PIN/Konten). Nur [oidc]-Extra nötig.
#
# Das Abbild ist GEPINNT. Vorher stand hier ein `pip install` ohne Ref: damit zog jeder
# Neustart den aktuellen Hauptzweig — zwei Container derselben Datei konnten verschiedene
# Versionen fahren, ohne Netz startete gar nichts, und ein Rollback gab es nicht.
#
# Aktualisieren = Abbild-Tag hochziehen, `docker compose pull && docker compose up -d`.
# Rollback = alten Tag zurückschreiben. Wer es ernst meint, pinnt den Digest
# (`ghcr.io/ollornog/tinysesam@sha256:…`) — ein Tag lässt sich umhängen, ein Digest nicht.
# Der Digest steht im Log des release-Workflows. Es gibt bewusst kein `latest`.

services:
  tinysesam:
    image: ghcr.io/ollornog/tinysesam:v0.13.1
    # Kein `command:` nötig — der Entrypoint startet das Gateway. Es läuft als Nicht-root
    # (uid 1000) und bringt einen HEALTHCHECK auf /healthz mit.
    environment:
      TINYSESAM_OIDC_ISSUER: "https://id.example.com"
      TINYSESAM_OIDC_CLIENT_ID: "gateway"
      TINYSESAM_OIDC_CLIENT_SECRET: "CHANGE_ME"
      TINYSESAM_BASE_URL: "https://auth.example.com"
      TINYSESAM_COOKIE_DOMAIN: ".example.com"
      TINYSESAM_PROTECTED_HOSTS: "app.example.com,wiki.example.com"
      # TINYSESAM_ALLOWED_GROUPS: "mitarbeiter"       # optional: nur diese OIDC-Gruppen
      TINYSESAM_TRUSTED_PROXIES: "0.0.0.0/0"          # hier vertrauen wir dem internen Caddy
      TINYSESAM_HTTPS_MODE: "warn"                     # TLS terminiert Caddy davor
      TINYSESAM_DB: "/data/gateway.db"
      TINYSESAM_PORT: "8000"
    volumes:
      - tinysesam-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - tinysesam
    restart: unless-stopped

volumes:
  tinysesam-data:
  caddy-data:
  caddy-config:
