# TinySesam Forward-Auth mit nginx (auth_request).
#
# Voraussetzung in TinySesamConfig: forward_auth_enabled=True, base_url, cookie_domain,
# trusted_redirect_hosts, trusted_proxies (siehe Caddyfile-Kommentar).

server {
    listen 443 ssl;
    server_name app.example.com;

    # Interner Sub-Request an TinySesam
    location = /auth/forward {
        internal;
        proxy_pass http://127.0.0.1:8000/auth/forward;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        auth_request /auth/forward;

        # Auth-Antwort-Header an die Upstream-App durchreichen
        auth_request_set $user  $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $email $upstream_http_remote_email;
        proxy_set_header Remote-User $user;
        proxy_set_header Remote-Groups $groups;
        proxy_set_header Remote-Email $email;

        # bei 401 → Redirect zur Login-URL aus dem Header
        auth_request_set $login $upstream_http_x_tinysesam_location;
        error_page 401 = @tinysesam_login;

        proxy_pass http://127.0.0.1:9000;   # eigentliche App
    }

    location @tinysesam_login {
        return 302 $login;
    }
}
