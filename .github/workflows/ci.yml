name: tests

# Feature-Branches laufen bewusst OHNE CI — dort prüft `ci-local` (Docker, offline).
# Volle CI erst beim Pull Request und auf main. Gemergt wird nach grünem lokalem Lauf.
# Notausgang für WIP auf main: [skip ci] in der Commit-Message.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Voller Lauf mit allen Extras über die Matrix min + prod + max (siehe testing-policy.md):
  #   3.10 = Untergrenze aus requires-python  (ohne sie ist die Zusage unbelegt)
  #   3.12 = was in Prod / im ci-python-web-Image läuft
  #   3.14 = aktuelle stable (seit 10/2025) — wurde vorher gar nicht getestet
  # Prerelease (3.15) läuft separat nightly mit continue-on-error, damit ein RC-Bug
  # keinen Push blockiert.
  full:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Systempaket für SAML (xmlsec)
        run: sudo apt-get update && sudo apt-get install -y libxmlsec1-dev pkg-config
      - name: Install (alle Extras)
        run: pip install -e '.[all]'
      - name: Tests
        run: python tests/run_all.py

  # Minimal-Install ohne Extras: sichert den stdlib-scrypt-Fallback + Kernpfad ab
  # (Suiten, die zwingend Extras brauchen, werden vom Runner als skip gewertet).
  minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (nur Kern + httpx fürs TestClient-Werkzeug)
        run: pip install -e . httpx
      - name: Tests (Kern / scrypt-Fallback; Passkey/OIDC-Suiten werden übersprungen)
        run: python tests/run_all.py

  # Die Seiten im echten Browser: Konsolenfehler, Breiten, Sprachwechsel, Dark-Mode, Login.
  # Ohne diesen Job faellt eine Design-Regression erst dem Nutzer auf.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Chrome installieren
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true
      - name: Chrome vorhanden?
        run: which chrome || which google-chrome; chrome --version || google-chrome --version
      - name: Abhängigkeiten
        run: pip install -e . uvicorn websockets httpx
      - name: Website bauen (muss durchlaufen)
        run: python -m web.build _site
      - name: Browser-Test
        run: python tests/test_browser.py
      - name: Repo-Hygiene
        run: python tests/test_repo.py
      - name: Website-Test
        run: python tests/test_site.py
