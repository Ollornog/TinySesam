name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  # Voller Lauf mit allen Extras über mehrere Python-Versionen — das Sicherheitsnetz bei Updates.
  full:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (alle Extras)
        run: pip install -e '.[all]'
      - name: Tests
        run: python tests/run_all.py

  # Minimal-Install ohne Extras: sichert den stdlib-scrypt-Fallback + Kernpfad ab
  # (Suiten, die zwingend Extras brauchen, werden vom Runner als skip gewertet).
  minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (nur Kern + httpx fürs TestClient-Werkzeug)
        run: pip install -e . httpx
      - name: Tests (Kern / scrypt-Fallback; Passkey/OIDC-Suiten werden übersprungen)
        run: python tests/run_all.py
