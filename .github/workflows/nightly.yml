name: nightly (prerelease)

# Python-Prerelease (3.15) NUR hier, nie im Push-/PR-Gate: ein RC-Bug darf keinen
# Push blockieren. Deshalb continue-on-error — der Lauf informiert, er urteilt nicht.
# Siehe ~/.claude/context/testing-policy.md, Abschnitt „Versions-Matrix".
#
# Zeit: GitHub-cron kennt nur UTC. '30 1 * * *' = 03:30 Europe/Berlin (MESZ)
# bzw. 02:30 (MEZ). Bewusst nachts, damit es keinen Runner tagsüber belegt.
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  prerelease:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.15"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Systempaket für SAML (xmlsec)
        run: sudo apt-get update && sudo apt-get install -y libxmlsec1-dev pkg-config
      - name: Install (alle Extras)
        run: pip install -e '.[all]'
      - name: Tests (Ausfall ist erlaubt — Prerelease)
        run: python tests/run_all.py
