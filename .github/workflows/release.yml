name: release

# Ein Git-Tag `vX.Y.Z` erzeugt zweierlei:
#   1. ein GitHub-Release mit Wheel, sdist und Prüfsummen (für die Bibliothek)
#   2. ein Container-Abbild `ghcr.io/ollornog/tinysesam:<version>` (für das Gateway)
#
# Das ist der einzige Verteilweg: TinySesam aktualisiert sich nicht selbst, es wird
# installiert — per gepinntem Tag, Wheel oder Abbild-Tag aus genau diesem Release.
#
# Vorher prüft der Job, dass der Tag zur Version im Paket passt. Ein Release mit
# falscher Versionsnummer ist schlimmer als keins: es ist unauffällig falsch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write        # Release anlegen und Dateien anhängen
  packages: write        # Abbild nach GHCR schieben

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tag gegen die Paketversion prüfen
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import tomllib,pathlib;
          print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $GITHUB_REF_NAME passt nicht zu pyproject-Version $pkg" >&2
            exit 1
          fi
          echo "Tag und Paketversion stimmen überein: $pkg"

      - name: Suite fahren, bevor irgendetwas veröffentlicht wird
        run: |
          sudo apt-get update && sudo apt-get install -y libxmlsec1-dev pkg-config
          pip install -e ".[all]" uvicorn httpx
          python tests/run_all.py --no-browser

      - name: Pakete bauen
        run: |
          pip install build
          python -m build                       # erzeugt dist/*.whl und dist/*.tar.gz

      - name: Prüfsummen
        run: cd dist && sha256sum ./* > SHA256SUMS && cat SHA256SUMS

      # Bewusst `gh` statt einer Dritt-Action: die bräuchte `contents: write` auf dieses Repo,
      # und ihr Tag liesse sich umhängen. `gh` ist auf den Runnern vorinstalliert.
      - name: Release anlegen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag

  # Das Gateway-Abbild. Läuft erst, wenn das Release steht — ein Abbild ohne Release
  # wäre ein Artefakt, zu dem die Notizen fehlen.
  image:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # arm64 wird emuliert. Das ist nur erträglich, weil das Abbild ausschließlich das
      # `[oidc]`-Extra installiert (reine Python-Räder). Mit `[all]` müsste hier libxmlsec1
      # kompiliert werden — Minuten statt Sekunden.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: An GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Abbild bauen und schieben
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # Genau ein Tag, gleich dem Git-Tag. Bewusst KEIN `latest`: ein Tag, der wandert,
          # macht jeden Neustart zum Glücksspiel — dasselbe Compose zöge irgendwann eine
          # andere Version, ohne dass jemand etwas geändert hätte.
          tags: ghcr.io/${{ github.repository_owner }}/tinysesam:${{ github.ref_name }}
          provenance: false

      - name: Digest ausgeben (für einen unveränderlichen Pin)
        run: |
          echo "Abbild: ghcr.io/${{ github.repository_owner }}/tinysesam:${GITHUB_REF_NAME}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
          echo "Unveränderlich pinnen: ghcr.io/${{ github.repository_owner }}/tinysesam@${{ steps.push.outputs.digest }}"
