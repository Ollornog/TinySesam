name: pages

# Baut die Projekt-Website aus web/site.py und veröffentlicht sie auf GitHub Pages.
# Die HTML-Dateien liegen deshalb nicht im Repo — geändert wird nur die Quelle.
#
# Einmalig nötig: Settings → Pages → Source = "GitHub Actions", per API:
#   gh api -X PUT repos/<owner>/<repo>/pages -f build_type=workflow
# Steht die Quelle auf "Deploy from a branch", liefert Pages den Ordner `docs/` aus — der hat
# kein index.html, also 404; zusätzlich belegt der Automatik-Build das Deployment, woran dieser
# Workflow mit "in progress deployment" scheitert. Prüfen:
#   gh api repos/<owner>/<repo>/pages --jq '{build_type,source}'

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      # Die Demo-Seite rendert Login-, Konto- und Admin-Panel aus der Bibliothek. Ändert die
      # sich, ändert sich die Website — auch ohne Anfassen von `web/`.
      - "tinysesam/**"
      - "docs/theme.css"
      - "docs/wizard.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # Die Demo-Seite rendert ihre Panels aus der Bibliothek selbst — dafür muss sie
      # importierbar sein. Ohne Extras: die Vorschauen brauchen weder OIDC noch SAML.
      - name: Bibliothek installieren
        run: pip install .

      - name: Website bauen
        run: python -m web.build _site
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      # include-hidden-files: seit v4 werden Dotfiles standardmäßig WEGGELASSEN.
      # web/build.py legt `.nojekyll` an — ohne den Schalter fiele die Datei still
      # aus dem Artefakt: CI grün, Artefakt hochgeladen, Deploy erfolgreich, nur der
      # Inhalt wäre ein anderer als bisher. Der Schalter hält das Artefakt exakt so,
      # wie es vor dem Node-24-Sprung war — der Bump hebt die Laufzeit, nicht das Verhalten.
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
